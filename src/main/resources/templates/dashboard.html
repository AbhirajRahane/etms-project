<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f0f2f5; }
        .wrapper { display: flex; }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #1f2937;
            color: #fff;
            height: 100vh;
            padding: 20px;
            position: fixed;
        }
        .sidebar h2 { margin-top: 0; margin-bottom: 30px; }
        .sidebar a {
            display: block;
            color: #fff;
            text-decoration: none;
            margin-bottom: 15px;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .sidebar a:hover { background: #374151; }
        .sidebar button {
            width: 100%;
            margin-top: 20px;
            padding: 8px;
            background: #ef4444;
            border: none;
            color: white;
            border-radius: 6px;
        }

        /* MAIN */
        .main {
            margin-left: 220px;
            padding: 20px;
            width: calc(100% - 220px);
        }

        .navbar {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* STATS */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background: #1f2a38;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
        }

        .stat-card:hover { transform: scale(1.05); }

        /* CARD */
        .card {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        /* 🔥 FIXED HEADER */
        thead {
            background: #1f2a38;
        }

        thead th {
            background: #1f2a38;
            color: #ffffff;
            padding: 14px;
            text-align: left;
            font-weight: 600;
            border-bottom: none;
        }

        /* BODY */
        tbody td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        /* BADGES */
        .badge {
            padding: 5px 10px;
            border-radius: 6px;
            color: white;
            font-size: 12px;
        }

        .completed { background: #10b981; }
        .progress { background: #f59e0b; }
        .pending { background: #6b7280; }

        /* INPUT */
        .status-select {
            padding: 6px;
            border-radius: 5px;
        }

        .update-btn {
            margin-left: 5px;
            padding: 6px 10px;
            border-radius: 5px;
            background: #2563eb;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
        }

        .toast-success { background: green; }
        .toast-error { background: red; }

    </style>

    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>ETMS</h2>
        <a th:href="@{/dashboard}">Dashboard</a>

        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button>Logout</button>
        </form>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="navbar">Employee Dashboard</div>

        <!-- STATS -->
        <div class="stats">
            <div class="stat-card" data-filter="All">
                <h3 id="totalTasks" th:text="${tasks.size()}">0</h3>
                <p>Total Tasks</p>
            </div>

            <div class="stat-card" data-filter="Completed">
                <h3 id="completedTasks" th:text="${tasks.?[status=='Completed'].size()}">0</h3>
                <p>Completed</p>
            </div>

            <div class="stat-card" data-filter="Pending">
                <h3 id="pendingTasks" th:text="${tasks.?[status=='Pending'].size()}">0</h3>
                <p>Pending</p>
            </div>
        </div>

        <!-- TASK TABLE -->
        <div class="card">
            <h3>Your Tasks</h3>

            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Description</th>
                        <th>Update Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="task : ${tasks}" class="task-row" th:data-task-id="${task.id}">
                        <td th:text="${task.title}"></td>

                        <td>
                            <span class="badge"
                                  th:text="${task.status}"
                                  th:classappend="${task.status=='Completed'} ? ' completed' :
                                                  (task.status=='In Progress' ? ' progress' : ' pending')">
                            </span>
                        </td>

                        <td th:text="${task.description}"></td>

                        <td>
                            <select class="status-select">
                                <option value="Pending" th:selected="${task.status=='Pending'}">Pending</option>
                                <option value="In Progress" th:selected="${task.status=='In Progress'}">In Progress</option>
                                <option value="Completed" th:selected="${task.status=='Completed'}">Completed</option>
                            </select>

                            <button type="button" class="update-btn" onclick="updateTaskStatus(this)">
                                Update
                            </button>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(tasks)}">
                        <td colspan="4" style="text-align:center; color:#888;">No tasks assigned</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<!-- JS (UNCHANGED) -->
<script>
const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = 'toast ' + (type === 'success' ? 'toast-success' : 'toast-error');
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function updateTaskStatus(button) {
    const row = button.closest('.task-row');
    const taskId = row.getAttribute('data-task-id');
    const select = row.querySelector('.status-select');
    const newStatus = select.value;

    fetch(`/employee/tasks/${taskId}/update-status`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            [csrfHeader]: csrfToken
        },
        body: JSON.stringify({status: newStatus})
    })
    .then(res => res.json())
    .then(data => {
        if (!data.success) throw new Error(data.message);

        const badge = row.querySelector('.badge');
        badge.textContent = newStatus;
        badge.className = 'badge ' + 
            (newStatus === 'Completed' ? 'completed' :
             newStatus === 'In Progress' ? 'progress' :
             'pending');

        showToast('Task updated successfully', 'success');
        refreshStats();
    })
    .catch(err => {
        showToast('Error updating task', 'error');
    });
}

function refreshStats() {
    const rows = document.querySelectorAll('.task-row');
    let total = 0, completed = 0, pending = 0;

    rows.forEach(row => {
        if (row.style.display === 'none') return;

        total++;
        const status = row.querySelector('.badge').textContent.trim();

        if (status === 'Completed') completed++;
        else if (status === 'Pending') pending++;
    });

    document.getElementById('totalTasks').textContent = total;
    document.getElementById('completedTasks').textContent = completed;
    document.getElementById('pendingTasks').textContent = pending;
}

document.querySelectorAll('.stat-card').forEach(card => {
    card.addEventListener('click', () => {
        const filter = card.getAttribute('data-filter');
        document.querySelectorAll('.task-row').forEach(row => {
            const status = row.querySelector('.badge').textContent.trim();
            row.style.display = (filter === 'All' || status === filter) ? '' : 'none';
        });
        refreshStats();
    });
});
</script>

</body>
</html>
