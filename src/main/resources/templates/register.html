<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - ETMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .left-side {
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: #fff;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            text-align: center;
        }
        .left-side h1 { font-size: 40px; margin-bottom: 20px; line-height: 1.2; }
        .left-side p { font-size: 18px; line-height: 1.6; }
        .right-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f2f5;
        }
        .register-card {
            background: #fff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            width: 380px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .register-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .register-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }
        .register-card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .register-card button {
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease;
        }
        .register-card button:hover { background: #357abd; }
        .register-card .login-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #4a90e2;
            text-decoration: none;
            font-size: 14px;
        }
        .register-card .login-link:hover { text-decoration: underline; }
        .error-message {
            color: red;
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
            display: none; /* hide initially */
        }
        @media (max-width: 900px) {
            body { flex-direction: column; }
            .left-side, .right-side { flex: unset; width: 100%; padding: 30px; }
            .register-card { width: 100%; max-width: 400px; }
        }
    </style>
</head>
<body>

<div class="left-side">
    <h1>Welcome to ETMS</h1>
    <p>Create your account and start managing your tasks, projects, and team efficiently.</p>
</div>

<div class="right-side">
    <div class="register-card">
        <h2>Create Account</h2>

        <form th:action="@{/register}" th:object="${user}" method="post" id="registerForm">
            <!-- Always render the error div -->
            <div id="passwordError" class="error-message"></div>
            <div th:if="${error}" class="error-message" th:text="${error}" style="display:block;"></div>
            <div th:if="${emailExists}" class="error-message" th:text="${emailExists}" style="display:block;"></div>

            <input type="email" th:field="*{email}" placeholder="Email" required>
            <input type="password" th:field="*{password}" id="password" placeholder="Password" required>
            <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm Password" required>

            <button type="submit">Register</button>
        </form>

        <a th:href="@{/login}" class="login-link">Already have an account? Login</a>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const form = document.getElementById('registerForm');
    const passwordError = document.getElementById('passwordError');

    form.addEventListener('submit', function(e) {
        const password = document.getElementById('password').value.trim();
        const confirm = document.getElementById('confirmPassword').value.trim();

        if (password !== confirm) {
            e.preventDefault(); // stop form submission
            passwordError.textContent = "Passwords do not match!";
            passwordError.style.display = "block"; // show the message
        } else {
            passwordError.textContent = "";
            passwordError.style.display = "none"; // hide message if matched
        }
    });
});
</script>

</body>
</html>
