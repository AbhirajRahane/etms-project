<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - ETMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Left side - gradient background with welcome */
        .left-side {
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: #fff;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            text-align: center;
        }
        .left-side h1 {
            font-size: 40px;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        .left-side p {
            font-size: 18px;
            line-height: 1.6;
        }

        /* Right side - login card */
        .right-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f2f5;
        }

        .login-card {
            background: #fff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            width: 380px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
            font-weight: 600;
        }

        .login-card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: #4a90e2;
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease;
        }
        .login-card button:hover {
            background: #357abd;
        }

        .login-card .register-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #4a90e2;
            text-decoration: none;
            font-size: 14px;
        }
        .login-card .register-link:hover {
            text-decoration: underline;
        }

        /* Responsive adjustments */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }
            .left-side, .right-side {
                flex: unset;
                width: 100%;
                padding: 30px;
            }
            .login-card {
                width: 100%;
                max-width: 400px;
            }
        }
    </style>
</head>
<body>

    <!-- Left side welcome -->
    <div class="left-side">
        <h1>Welcome Back!</h1>
        <p>Please login to access your tasks, track projects, and manage your work efficiently.</p>
    </div>

    <!-- Right side login card -->
    <div class="right-side">
        <div class="login-card">
            <h2>Login</h2>
			
			<div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>

            <form th:action="@{/login}" method="post">
                <input type="email" name="username" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <a th:href="@{/register}" class="register-link">Don't have an account? Register</a>
        </div>
    </div>

</body>
</html>
