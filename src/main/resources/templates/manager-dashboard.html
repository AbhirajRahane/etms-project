<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manager Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <style>
        /* Toasts */
        #toastContainer { position: fixed; bottom:20px; right:20px; z-index:2000; }
        .toast { background:#4CAF50; color:#fff; padding:12px 20px; border-radius:8px; margin-top:10px; opacity:0; transition:opacity 0.5s; }

        /* Modals */
        .delete-confirm-modal, .create-task-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background:#fff; padding:30px; border-radius:10px; text-align:center; width:400px; max-width:90%; }
        .modal-content button { padding:10px 20px; margin:10px 5px 0 5px; border:none; border-radius:6px; cursor:pointer; }
        .delete-confirm-modal .yes-btn { background:#4CAF50; color:white; }
        .delete-confirm-modal .no-btn { background:#d9534f; color:white; }
        .create-task-modal input, .create-task-modal select, .create-task-modal textarea { width:100%; padding:10px; margin:8px 0; border-radius:6px; border:1px solid #ccc; font-size:14px; }
        .create-task-modal .save-btn { background:#4CAF50; color:white; width:100%; }
        .create-task-modal .cancel-btn { background:#d9534f; color:white; width:100%; }

        /* Stats Cards */
        .stats { display:flex; gap:20px; margin-bottom:20px; }
        .stat-card { background-color:#1f2937; color:white; padding:20px; border-radius:8px; flex:1; text-align:center; }
        table { width:100%; border-collapse: collapse; }
        th, td { padding:12px; border-bottom:1px solid #ddd; text-align:left; }
        th { background-color:#111827; color:white; }
        .btn-danger { background:#d9534f; color:white; padding:6px 12px; border:none; border-radius:6px; cursor:pointer; }
        .main { padding:20px; margin-left:200px; }
        .sidebar { width:200px; position:fixed; height:100%; background:#111827; color:white; padding:20px; }
        .sidebar h2 { margin-bottom:20px; }
        .sidebar a, .sidebar button { display:block; margin-bottom:10px; color:white; text-decoration:none; }
        .navbar { font-size:24px; margin-bottom:20px; }
        .card { background:#f3f4f6; padding:20px; border-radius:8px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="sidebar">
        <h2>ETMS</h2>
        <a th:href="@{/manager/dashboard}">Dashboard</a>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-danger">Logout</button>
        </form>
    </div>

    <div class="main">
        <div class="navbar">Manager Dashboard</div>
        <div class="container">
            <!-- Stats Cards -->
            <div class="stats">
                <div class="stat-card" id="totalCard" data-filter="All">
                    <h3 th:text="${tasks.size()}">0</h3><p>Total Tasks</p>
                </div>
                <div class="stat-card" id="completedCard" data-filter="Completed">
                    <h3 th:text="${tasks.?[status=='Completed'].size()}">0</h3><p>Completed</p>
                </div>
                <div class="stat-card" id="pendingCard" data-filter="Pending">
                    <h3 th:text="${tasks.?[status=='Pending'].size()}">0</h3><p>Pending</p>
                </div>
            </div>

            <!-- Task Table -->
            <div class="card">
                <h3>All Tasks</h3>
                <table>
                    <thead>
                        <tr><th>Title</th><th>Status</th><th>Assigned To</th><th>Action</th></tr>
                    </thead>
                    <tbody id="taskTableBody">
                        <tr th:each="task : ${tasks}" class="task-row" th:data-task-id="${task.id}">
                            <td><input type="text" class="inline-edit inline-title" th:value="${task.title}"></td>
                            <td>
                                <select class="inline-edit inline-status">
                                    <option th:selected="${task.status=='Pending'}">Pending</option>
                                    <option th:selected="${task.status=='In Progress'}">In Progress</option>
                                    <option th:selected="${task.status=='Completed'}">Completed</option>
                                </select>
                            </td>
                            <td>
                                <select class="inline-edit inline-assigned">
                                    <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.email}" th:selected="${task.assignedTo != null and task.assignedTo.id == user.id}"></option>
                                </select>
                            </td>
                            <td><button class="btn btn-danger delete-btn">Delete</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <button id="addTaskBtn" style="margin-top:20px; padding:10px 20px; background:#4CAF50; color:white; border:none; border-radius:6px; cursor:pointer;">+ Add Task</button>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div id="deleteModal" class="delete-confirm-modal">
    <div class="modal-content">
        <p>Are you sure you want to delete this task?</p>
        <button class="yes-btn">Yes</button>
        <button class="no-btn">No</button>
    </div>
</div>

<!-- Create Task Modal -->
<div id="createTaskModal" class="create-task-modal">
    <div class="modal-content">
        <h3>Create New Task</h3>
        <input type="text" id="newTaskTitle" placeholder="Title" required>
        <textarea id="newTaskDesc" placeholder="Description" rows="3"></textarea>
        <select id="newTaskStatus" required>
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
        </select>
        <select id="newTaskAssigned" required>
            <option value="" disabled selected>Select Employee</option>
            <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.email}"></option>
        </select>
        <button class="save-btn">Save Task</button>
        <button class="cancel-btn">Cancel</button>
    </div>
</div>

<div id="toastContainer"></div>

<script>
const csrfToken = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

// ===== Toast =====
function showToast(msg) {
    const toast=document.createElement('div'); toast.classList.add('toast'); toast.innerText=msg;
    document.getElementById('toastContainer').appendChild(toast);
    setTimeout(()=>{ toast.style.opacity='1'; },100);
    setTimeout(()=>{ toast.style.opacity='0'; setTimeout(()=>toast.remove(),500); },3000);
}

// ===== Delete Task =====
let taskToDelete = null;
function attachDelete(row){
    row.querySelector('.delete-btn').onclick = e=>{
        taskToDelete=row.dataset.taskId;
        document.getElementById('deleteModal').style.display='flex';
    }
}
document.querySelectorAll('.task-row').forEach(attachDelete);
document.querySelector('#deleteModal .yes-btn').onclick = ()=>{
    if(!taskToDelete) return;
    fetch(`/manager/delete-task/${taskToDelete}`,{method:'DELETE', headers:{[csrfHeader]:csrfToken}})
    .then(r=>r.json()).then(d=>{
        if(d.success){
            const row=document.querySelector(`.task-row[data-task-id="${taskToDelete}"]`);
            if(row) row.remove();
            showToast("Task deleted successfully");
        }else showToast("Error deleting task");
        taskToDelete=null; document.getElementById('deleteModal').style.display='none';
    }).catch(()=>{ showToast("Error deleting task"); taskToDelete=null; document.getElementById('deleteModal').style.display='none'; });
};
document.querySelector('#deleteModal .no-btn').onclick = ()=>{ taskToDelete=null; document.getElementById('deleteModal').style.display='none'; };

// ===== Inline Edit =====
function attachInlineEdit(row){
    const taskId=row.dataset.taskId;
    const title=row.querySelector('.inline-title');
    const status=row.querySelector('.inline-status');
    const assigned=row.querySelector('.inline-assigned');
    [title,status,assigned].forEach(el=>{
        el.addEventListener('change',()=>{
            fetch(`/manager/tasks/${taskId}/update-inline`,{
                method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrfToken},
                body:JSON.stringify({title:title.value,status:status.value,assignedToId:assigned.value})
            }).then(r=>r.json()).then(d=>{ if(d.success) showToast("Task updated"); else showToast("Error updating"); })
            .catch(()=>showToast("Error updating"));
        });
    });
}
document.querySelectorAll('.task-row').forEach(attachInlineEdit);

// ===== Create Task =====
const addBtn=document.getElementById('addTaskBtn');
const createModal=document.getElementById('createTaskModal');
addBtn.onclick=()=>{ createModal.style.display='flex'; };
createModal.querySelector('.cancel-btn').onclick=()=>{ createModal.style.display='none'; };

createModal.querySelector('.save-btn').onclick=()=>{
    const title=document.getElementById('newTaskTitle').value.trim();
    const desc=document.getElementById('newTaskDesc').value.trim();
    const status=document.getElementById('newTaskStatus').value;
    const assigned=document.getElementById('newTaskAssigned').value;
    if(!title||!status||!assigned){ showToast("Please fill all fields"); return; }

    fetch(`/manager/save-task`,{
        method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrfToken},
        body:JSON.stringify({title,description:desc,status,userId:assigned})
    }).then(r=>r.json()).then(data=>{
        if(data.success){
            fetchUpdatedTasks(); // refresh table after adding
            showToast("Task added successfully");
            createModal.style.display='none';
            document.getElementById('newTaskTitle').value='';
            document.getElementById('newTaskDesc').value='';
            document.getElementById('newTaskStatus').value='Pending';
            document.getElementById('newTaskAssigned').value='';
        }else showToast("Error adding task");
    }).catch(()=>showToast("Error adding task"));
};

// ===== Real-Time Task Updates (Polling every 3 sec) =====
function fetchUpdatedTasks() {
    fetch('/manager/tasks/updates', {
        method: 'GET',
        headers: { [csrfHeader]: csrfToken }
    })
    .then(res => res.json())
    .then(data => {
        const tbody = document.getElementById('taskTableBody');
        tbody.innerHTML = '';

        data.tasks.forEach(task => {
            const newRow = document.createElement('tr');
            newRow.classList.add('task-row');
            newRow.dataset.taskId = task.id;

            newRow.innerHTML = `
                <td><input type="text" class="inline-edit inline-title" value="${task.title}"></td>
                <td>
                    <select class="inline-edit inline-status">
                        <option ${task.status=='Pending'?'selected':''}>Pending</option>
                        <option ${task.status=='In Progress'?'selected':''}>In Progress</option>
                        <option ${task.status=='Completed'?'selected':''}>Completed</option>
                    </select>
                </td>
                <td>
                    <select class="inline-edit inline-assigned">
                        <option value="${task.assignedTo.id}" selected>${task.assignedTo.email}</option>
                    </select>
                </td>
                <td><button class="btn btn-danger delete-btn">Delete</button></td>
            `;

            tbody.appendChild(newRow);
            attachInlineEdit(newRow);
            attachDelete(newRow);
        });

        // Update Stats
        document.getElementById('totalCard').querySelector('h3').innerText = data.totalTasks;
        document.getElementById('completedCard').querySelector('h3').innerText = data.completedTasks;
        document.getElementById('pendingCard').querySelector('h3').innerText = data.totalTasks - data.completedTasks;
    })
    .catch(err => console.error('Error fetching tasks:', err));
}

// Fetch updated tasks every 3 seconds
setInterval(fetchUpdatedTasks, 3000);
fetchUpdatedTasks(); // initial fetch

</script>
</body>
</html>
