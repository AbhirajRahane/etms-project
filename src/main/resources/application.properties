spring.application.name=etms
spring.datasource.url=jdbc:mysql://localhost:3306/etms_db
spring.datasource.username=root
spring.datasource.password=Abhi@2004

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.thymeleaf.cache=false

# Error settings
server.error.include-message=always
server.error.include-binding-errors=always

# ================== LOGGING CLEANUP ==================

# Show only important logs
logging.level.root=INFO

# Your project logs (keep detailed)
logging.level.com.company.etms=DEBUG

# Reduce Spring framework logs
logging.level.org.springframework=WARN


# Keep log file
logging.file.name=logs/etms-app.log

# Clean format
logging.pattern.console=%d{HH:mm:ss} [%level] %logger{20} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{20} - %msg%n